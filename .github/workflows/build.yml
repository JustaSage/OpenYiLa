name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: windows-latest
            target: windows-amd64
          - os: macos-latest
            target: macos-arm64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.target }})

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Build executable
        run: |
          uv run pyinstaller \
            --name openyila \
            --hidden-import openyila \
            --hidden-import openyila.protocol \
            --hidden-import openyila.device \
            --hidden-import openyila.scanner \
            --hidden-import openyila.client \
            --hidden-import openyila.i18n \
            --hidden-import openyila.cli \
            --hidden-import bleak \
            --hidden-import Crypto \
            --hidden-import Crypto.Cipher \
            --hidden-import Crypto.Cipher.AES \
            --collect-submodules bleak \
            --collect-submodules Crypto \
            --onefile \
            --strip \
            --noconfirm \
            openyila/cli.py
        shell: bash

      - name: Rename artifact
        run: |
          if [[ "${{ matrix.target }}" == windows-* ]]; then
            mv dist/openyila.exe "dist/openyila-${{ matrix.target }}.exe"
          else
            mv dist/openyila "dist/openyila-${{ matrix.target }}"
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openyila-${{ matrix.target }}
          path: dist/openyila-${{ matrix.target }}*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
